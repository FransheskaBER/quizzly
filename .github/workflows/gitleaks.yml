name: Secret Scan

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            detect \
            --source=/repo \
            --config=/repo/.gitleaks.toml \
            --log-opts="--max-count=1" \
            --redact \
            --verbose
