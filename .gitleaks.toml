[extend]
useDefault = true

[[allowlists]]
description = "Deterministic non-secret test literals"
regexTarget = "match"
regexes = [
  '''sk-ant-(test|invalid|byok)-[a-z0-9-]+''',
  '''(valid|wrong|new|next|test-user)-test-password-[a-z0-9!-]+''',
  '''nonsecret-test-header-value''',
  '''Bearer test-token''',
  '''encrypted-placeholder-value'''
]

[[allowlists]]
description = "GitHub Actions secret references (variable names, not values)"
paths = ['''\.github/workflows/.*\.ya?ml$''']

[[allowlists]]
description = "S3 object key in error logs (path, not API key)"
paths = ['''packages/server/src/services/material\.service\.ts''']
